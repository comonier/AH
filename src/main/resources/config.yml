# Configurações principais do Plugin AH
# Linguagens disponíveis: "en", "pt"
language: "en"

# Configurações do Leilão
auction:
  # Tempo padrão para um item expirar (em horas)
  expire-time-hours: 48
  # Taxa de venda (ex: 0.05 para 5%)
  selling-tax: 0.05
  # Preço mínimo para anunciar um item
  minimum-price: 10.0
  # Limite máximo de itens que um jogador pode anunciar simultaneamente
  max-items-per-player: 28

# Configurações da Interface (GUI)
gui:
  # Título principal do menu de categorias
  main-menu-title: "&8Auction House - Categories"
  # Título da janela de pesquisa
  search-title: "&8Search item by name/ID"

# Mensagem de debug no console
debug-mode: false
